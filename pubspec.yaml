name: one_piece_card_scanner
description: "One Piece Card Game Scanner"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  # Base de datos local
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  # HTTP para servidor propio
  http: ^1.2.2
  # Para guardar imagen en galería/disco
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
